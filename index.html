<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>I'm Sorry 🥺</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#ffd6e7,#fff0f6);
text-align:center;
padding-top:80px;
overflow:hidden;
}

h1{
color:#ff3b6b;
font-size:42px;
}

#bear{
font-size:120px;
margin:20px;
transition:0.3s;
}

p{
font-size:20px;
width:60%;
margin:auto;
color:#444;
}

button{
padding:15px 25px;
font-size:18px;
border:none;
border-radius:25px;
cursor:pointer;
margin:20px;
}

#yes{
background:#ff4d6d;
color:white;
}

#no{
background:#cccccc;
}

#message{
margin-top:30px;
font-size:26px;
display:none;
}

.heart{
position:absolute;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);}
100%{transform:translateY(-900px);}
}

</style>
</head>

<body>

<h1>Hey 🥺</h1>

<div id="bear">🧸</div>

<p>
I know I messed up and I'm really sorry. I was thoughtless but I didnt mean anything bad last night. 
You do a lot to me and I hate that I hurt you.  
So I made this little page for you. I'm really sorry baby.
</p>

<h2>Will you forgive me?</h2>

<button id="yes" onclick="yesClick()">Yes ❤️</button>
<button id="no" onclick="noClick()">No 💔</button>

<div id="message"></div>

<script>

function yesClick(){

document.getElementById("bear").innerHTML="🥰";

document.getElementById("message").style.display="block";

document.getElementById("message").innerHTML="YAY!! Thank you for forgiving me ❤️";

createHearts();

}

function noClick(){

document.getElementById("bear").innerHTML="😢";

document.getElementById("message").style.display="block";

document.getElementById("message").innerHTML="Oh no... the bear is very sad now 🥺";

}

function createHearts(){

for(let i=0;i<20;i++){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.top=Math.random()*100+"vh";

document.body.appendChild(heart);

}

}

</script>

</body>
</html>
